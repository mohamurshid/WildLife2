<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="page">
    <h1>Save Our Wildlife</h1>

    <video id="wildlifeVideo" controls width="100%">
      <source src="wildlife.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <p class="description">
      Join our mission to protect endangered species and their habitats.
      Watch this short film to see how your support makes a real difference
      for wildlife conservation around the world.
    </p>

    <button id="toggleBtn" aria-pressed="false">
      Play / Hide Video
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
